name: Self-Evolving Agent CI



on:

  push:
  
    branches: [ main ]
    
  pull_request:
  
    branches: [ main ]
    
  workflow_dispatch:
  


jobs:

  build-and-run:
  
    runs-on: ubuntu-latest
    


    steps:
    
    - uses: actions/checkout@v3
    


    - name: Set up Python
    
      uses: actions/setup-python@v4
      
      with:
      
        python-version: '3.10'
        


    - name: Install dependencies
    
      run: |
      
        python -m pip install --upgrade pip
        
        pip install llama-cpp-python
        


    - name: Download small Llama model (for testing)
    
      run: |
      
        # Using a tiny model for testing purposes in CI
        
        wget https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf -O model.gguf
        


    - name: Run Agent
    
      env:
      
        LLAMA_MODEL_PATH: ./model.gguf
        
      run: |
      
        # Run the agent. Note: This might take some time or fail if resources are insufficient, 
        
        # but it serves as a basic CI check.
        
        python agent.py
        




























